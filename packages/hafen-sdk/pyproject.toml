[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "hafen-sdk"
version = "0.1.0"
description = "Python client for the Hafen migration platform REST API."
requires-python = ">=3.10"
license = { text = "Apache-2.0" }
authors = [{ name = "Hafen" }]
readme = "README.md"
dependencies = [
    "httpx>=0.27.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.4.3",
    "pytest-cov>=4.1.0",
]

[project.urls]
Homepage = "https://hafen.ai"
Source = "https://github.com/davidnhg74/hafen"

[tool.setuptools.packages.find]
where = ["src"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]
