version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: depart
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-depart_dev_pw}
      POSTGRES_DB: depart_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U depart"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql://depart:${POSTGRES_PASSWORD:-depart_dev_pw}@postgres:5432/depart_dev
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      ENVIRONMENT: ${ENVIRONMENT:-development}
    ports:
      - "8000:8000"
    volumes:
      - ./apps/api/src:/app/src
      - ./apps/api/tests:/app/tests
    depends_on:
      postgres:
        condition: service_healthy
    command: uvicorn src.main:app --host 0.0.0.0 --port 8000 --reload

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
      NEXT_PUBLIC_ENVIRONMENT: ${ENVIRONMENT:-development}
    ports:
      - "3000:3000"
    volumes:
      - ./apps/web/app:/app/app
      - ./apps/web/public:/app/public
    depends_on:
      - api
    command: npm run dev

volumes:
  postgres_data:
