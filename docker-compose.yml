services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: hafen_postgres
    environment:
      POSTGRES_DB: hafen
      POSTGRES_USER: hafen_user
      POSTGRES_PASSWORD: ${DB_PASSWORD:-hafen_secure_password}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --lc-collate=C --lc-ctype=C"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./apps/api/migrations/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hafen_user -d hafen"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - hafen_network

  # Queue broker for the arq migration worker. Lightweight — one key
  # per in-flight job plus a history list capped by arq. Sized for
  # laptop use; raise maxmemory for production.
  redis:
    image: redis:7-alpine
    container_name: hafen_redis
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    networks:
      - hafen_network
    restart: unless-stopped

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: hafen_api
    environment: &api_env
      DATABASE_URL: postgresql+psycopg://hafen_user:${DB_PASSWORD:-hafen_secure_password}@postgres:5432/hafen
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      # BYOK Anthropic key — optional. Can also be set at runtime from /settings/instance.
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      # Column encryption — optional but strongly recommended. Generate
      # with `python -c "from cryptography.fernet import Fernet; print(Fernet.generate_key().decode())"`
      HAFEN_ENCRYPTION_KEY: ${HAFEN_ENCRYPTION_KEY:-}
      # Cloud routes (auth/billing/support) default OFF for the self-hosted product.
      # hafen.ai (the marketing/purchase site) flips this to true.
      ENABLE_CLOUD_ROUTES: ${ENABLE_CLOUD_ROUTES:-false}
      # Remaining vars only matter when ENABLE_CLOUD_ROUTES=true.
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-me-in-production-super-secret-key}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      ENVIRONMENT: ${ENVIRONMENT:-development}
      API_HOST: 0.0.0.0
      API_PORT: "8000"
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 30s
    networks:
      - hafen_network
    restart: unless-stopped

  # arq worker — runs migrations out-of-process so an API restart
  # doesn't lose an in-flight run. Shares the API image (same code)
  # but boots the worker command instead of uvicorn.
  worker:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: hafen_worker
    command: ["arq", "src.worker.WorkerSettings"]
    environment: *api_env
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - hafen_network
    restart: unless-stopped

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    container_name: hafen_web
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    depends_on:
      - api
    networks:
      - hafen_network
    restart: unless-stopped

  # Oracle Free 23ai for integration tests / fixtures.
  # Excluded from default `up` (multi-GB image, slow start) — opt in with:
  #   docker compose --profile oracle up -d
  oracle:
    image: gvenzl/oracle-free:23-slim-faststart
    container_name: hafen_oracle
    profiles: ["oracle"]
    environment:
      ORACLE_PASSWORD: ${ORACLE_PASSWORD:-hafen_oracle_pw}
      APP_USER: hr
      APP_USER_PASSWORD: ${ORACLE_APP_PASSWORD:-hr_pw}
    ports:
      - "1521:1521"
    volumes:
      - oracle_data:/opt/oracle/oradata
      # Init scripts — applied once on first boot of a fresh volume.
      # Creates the HR-style fixture schema used by the live
      # introspector integration test.
      - ./docker/oracle-init:/container-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "healthcheck.sh"]
      interval: 30s
      timeout: 10s
      retries: 30
      start_period: 60s
    networks:
      - hafen_network

volumes:
  postgres_data:
    driver: local
  oracle_data:
    driver: local

networks:
  hafen_network:
    driver: bridge
