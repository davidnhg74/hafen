name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dev tooling
        run: |
          python -m pip install --upgrade pip
          # Pin to versions that match dev tooling. Bump in lockstep when
          # we want to adopt a newer black formatting style.
          pip install 'ruff>=0.1.8' 'black==25.11.0' 'mypy>=1.7.1'
      - name: ruff
        run: ruff check apps/api/src apps/api/tests
      - name: black --check
        run: black --check apps/api/src apps/api/tests

  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: hafen
          POSTGRES_USER: hafen_user
          POSTGRES_PASSWORD: hafen_secure_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U hafen_user -d hafen"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql+psycopg://hafen_user:hafen_secure_password@localhost:5432/hafen
      ENVIRONMENT: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install
        working-directory: apps/api
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Set up JRE for ANTLR
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - name: Generate ANTLR parser
        working-directory: apps/api
        run: python3 scripts/generate_grammar.py
      - name: Verify ANTLR path activated
        working-directory: apps/api
        # `python -c` does not auto-add CWD to sys.path; PYTHONPATH=. fixes that.
        # Print _generated/ contents on failure so the next debugger sees it.
        run: |
          ls -la src/source/oracle/_generated/ || true
          PYTHONPATH=. python3 -c "
          import importlib, traceback
          for m in ('src.source.oracle._generated.PlSqlLexer',
                   'src.source.oracle._generated.PlSqlParser',
                   'src.source.oracle._generated.PlSqlParserVisitor'):
              try:
                  importlib.import_module(m)
                  print(f'OK   {m}')
              except Exception as e:
                  print(f'FAIL {m}: {type(e).__name__}: {e}')
                  traceback.print_exc()
          from src.source.oracle import _visitor
          assert _visitor.is_available(), 'ANTLR _generated/ not importable after make grammar'
          "
      - name: Bootstrap extensions
        run: |
          PGPASSWORD=hafen_secure_password psql -h localhost -U hafen_user -d hafen \
            -c "CREATE EXTENSION IF NOT EXISTS vector; CREATE EXTENSION IF NOT EXISTS pgcrypto;"
      - name: Migrate
        working-directory: apps/api
        run: alembic upgrade head
      - name: Test
        working-directory: apps/api
        # Step-level timeout prevents a hung integration test from
        # eating the whole job. 8 minutes is well above expected
        # (tests run in ~10s locally).
        timeout-minutes: 8
        run: pytest tests/ -v --cov=src --cov-report=xml
      - name: Eval harness smoke (dry-run, no LLM)
        working-directory: apps/api
        # Exit-code 1 expected (mock returns "{}" so all rules fail); we
        # only care that the harness wires up + parses the corpus.
        run: |
          python3 -m src.ai.eval app_impact --dry || true
          python3 -m src.ai.eval runbook --dry || true
      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: apps/api/coverage.xml
          if-no-files-found: ignore

  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - run: npm ci
      - name: Type-check
        run: npm run type-check
      - name: Test
        run: npm test

  smoke:
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - uses: actions/checkout@v4
      - name: Smoke test
        run: make smoke
