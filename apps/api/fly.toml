# Fly.io deployment config for the Hafen cloud API at api.hafen.ai.
#
# This is the cloud-mode backend that powers hafen.ai's signup,
# billing, support, license issuance, and (optionally) hosted
# migrations. The same image runs in self-hosted mode when customers
# download the bundle and start it with ENABLE_CLOUD_ROUTES=false.
#
# Secrets (ANTHROPIC_API_KEY, JWT_SECRET_KEY, STRIPE_*, RESEND_API_KEY,
# DATABASE_URL, REDIS_URL) are NOT in this file — set via:
#   fly secrets set --app hafen-api KEY=value [...]

app = "hafen-api"
primary_region = "iad"

[build]
  # Reuse the existing self-hosted Dockerfile — no Fly-specific
  # build steps needed for Python/uvicorn.
  dockerfile = "Dockerfile"

[env]
  # Runtime env — non-secret. Cloud mode = signup/billing/support
  # endpoints mount; self-hosted mode would set this to "false".
  ENVIRONMENT = "production"
  ENABLE_CLOUD_ROUTES = "true"
  ENABLE_SELF_HOSTED_AUTH = "true"
  FRONTEND_URL = "https://hafen.ai"
  SUPPORT_EMAIL = "support@hafen.ai"
  # Tell uvicorn it's behind a proxy so client IPs in audit logs
  # come from X-Forwarded-For instead of Fly's edge.
  FORWARDED_ALLOW_IPS = "*"

[http_service]
  internal_port = 8000
  force_https = true
  # Don't scale to zero — first-request cold start would include the
  # alembic migration check, ANTLR jar load, and BYOK decryption,
  # which together push it past the 30s healthcheck grace window.
  # Keep at least one machine warm.
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [[http_service.checks]]
    grace_period = "30s"
    interval = "30s"
    method = "GET"
    timeout = "5s"
    path = "/health"

# The ANTLR-generated parser tables push memory above the 256MB
# default; 1GB gives headroom for medium-sized PL/SQL conversion
# requests without OOMing on a heavy /assess upload.
[[vm]]
  memory = "1gb"
  cpu_kind = "shared"
  cpus = 1
